{% extends 'base.html' %}
{% load static %}

{% block content %}
<section class="product-detail">
    <div class="detail-container">
        <div class="detail-image">
            <img src="{{ product.image.url }}" alt="{{ product.name }}">
        </div>
        <div class="detail-info">
            <h2>{{ product.name }}</h2>
            <p><strong>Artist:</strong><a href="{% url 'artist_profile' product.artist.id %}">{{ product.artist.name }}</a></p>
            <p class="price">KES {{ product.price }}</p>
            <p class="description">{{ product.description }}</p>
            <form method="POST" action="{% url 'add_to_cart' product.id %}">
        {% csrf_token %}
        <form method="POST" action="{% url 'add_to_cart' product.id %}">
            {% csrf_token %}
            <button type="button" class="add-to-cart-detail" data-product-id="{{ product.id }}">Add to Cart</button>
        </form> 
            <a href="{% url 'shop' %}" class="back-link">← Back to Shop</a>
        </div>
    </div>
</section>
{% endblock %}

{% block scripts %}
<script>
function setupAddToCartButtons(selector) {
    document.querySelectorAll(selector).forEach(button => {
        button.addEventListener('click', function(e) {
            e.preventDefault();
            const productId = this.dataset.id;

            fetch(/add-to-cart/${productId}/, {
                headers: { 'X-Requested-With': 'XMLHttpRequest' }
            })
            .then(response => response.json())
            .then(data => {
                // Append message
                const msgDiv = document.createElement('div');
                msgDiv.className = 'message';
                msgDiv.innerText = data.message;

                let messagesContainer = document.querySelector('.messages');
                if (!messagesContainer) {
                    // Create container if missing
                    messagesContainer = document.createElement('div');
                    messagesContainer.className = 'messages';
                    document.body.appendChild(messagesContainer);
                }
                messagesContainer.appendChild(msgDiv);

                // Remove after 3 seconds
                setTimeout(() => msgDiv.remove(), 3000);

                // Update cart count
                const cartLink = document.querySelector('a[href$="cart/"]');
                if (cartLink) {
                    cartLink.innerText = Cart (${data.total_items});
                }
            })
            .catch(err => console.error(err));
        });
    });
}

setupAddToCartButtons('.add-to-cart-shop');
setupAddToCartButtons('.add-to-cart-detail');
</script>
{% endblock %}
